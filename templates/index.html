

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brain Tumor Detection System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .main-title {
            color: #0d6efd;
            font-weight: 700;
        }

        .sub-title {
            color: #6c757d;
        }

        .card {
            border-radius: 12px;
        }

        .result-img {
            width: 100%;
            height: 360px;           
            object-fit: contain;      
            background-color: #000;  
            border-radius: 10px;
            padding: 5px;
        }

        .result-heading {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .prediction-text {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .confidence-text {
            font-size: 1rem;
            color: #198754;
        }
    </style>
</head>

<body>

<div class="container mt-5 mb-5">

  
    <div class="text-center mb-4">
        <h1 class="main-title">Brain Tumor Detection System</h1>
        <p class="sub-title">Prediction with Grad-CAM Explainability</p>
    </div>

    <div class="card shadow p-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="file" name="file" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Upload & Detect
            </button>
        </form>
    </div>

    {% if result %}
    <div class="card shadow mt-5">
        <div class="card-body text-center">

            <p class="prediction-text text-success">{{ result }}</p>
            <p class="confidence-text">Confidence: {{ confidence }}%</p>

            <div class="row mt-4">
                <div class="col-md-6 mb-4">
                    <div class="result-heading">Original MRI</div>
                    <img src="{{ file_path }}" class="result-img">
                </div>

                <div class="col-md-6 mb-4">
                    <div class="result-heading">Grad-CAM Explainability</div>
                    <img src="{{ gradcam_path }}" class="result-img">
                </div>
            </div>

        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
